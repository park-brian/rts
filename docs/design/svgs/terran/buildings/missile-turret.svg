<?xml version="1.0" encoding="UTF-8"?>
<svg class="sprite" viewBox="0 0 64 64" aria-label="Missile Turret" data-anchor="32 32" data-visible-box="19 19 26 26" data-footprint="2 2" data-bwapi-pixel-bounds="33 49" data-slug="missile-turret" xmlns="http://www.w3.org/2000/svg" width="256" height="256" color="#56d8ff" style="filter: none;"><style>
      .panel { fill: #0d1119; stroke: currentColor; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
      .line { fill: none; stroke: currentColor; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
      .core { fill: currentColor; stroke: none; }
      .light { fill: #eef8ff; stroke: none; }
      .cut { fill: #06080d; stroke: none; }
    </style>
        <!-- Lift feet, when present, define the full footprint envelope and sit below the inset hull. -->
        
        <!-- Base shell is footprint-proportioned for fixed buildings and inset for lift-capable buildings. -->
        <polygon class="panel shell" data-part="shell" points="23,19 41,19 45,23 45,41 41,45 23,45 19,41 19,23"></polygon>
        
        <circle class="line" data-part="pivot" data-anim="turret-rotate" cx="32" cy="32" r="5"></circle>
        <rect class="panel" data-part="left-launcher" data-anim="missile-source" data-emits="0 -1" x="24" y="23" width="5" height="13" rx="1.5"></rect>
        <rect class="panel" data-part="right-launcher" data-anim="missile-source" data-emits="0 -1" x="35" y="23" width="5" height="13" rx="1.5"></rect>
      </svg>
