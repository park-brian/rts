<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zerg Building Primitive Sprite Sheet</title>
<style>
  :root {
    --bg: #07050a; --panel: #0e0912; --ink: #f0d9ff; --muted: #9a729f;
    --line: #341f3d; --accent: #b985ff; --dark: #120d13; --dark2: #070509;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink); }
  body {
    font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    padding: 28px;
    background-image:
      linear-gradient(transparent 0 31px, rgba(185, 133, 255, 0.04) 31px 32px),
      linear-gradient(90deg, transparent 0 31px, rgba(255, 88, 88, 0.035) 31px 32px);
    background-size: 32px 32px;
  }
  header { max-width: 1180px; margin: 0 auto 22px; }
  h1 { margin: 0; font-size: 22px; letter-spacing: 0.16em; text-transform: uppercase; }
  p { margin: 8px 0 0; color: var(--muted); max-width: 920px; }
  .sheet { max-width: 1180px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
  .card { background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(0,0,0,0.22)), var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px 12px 12px; }
  .art { height: 148px; display: grid; place-items: center; background: radial-gradient(86px 78px at 50% 48%, rgba(185,133,255,0.13), transparent 72%); color: var(--accent); }
  svg.sprite { width: 124px; height: 124px; overflow: visible; filter: drop-shadow(0 0 2px currentColor) drop-shadow(0 0 5px currentColor); }
  .panel { fill: var(--dark); stroke: currentColor; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .line { fill: none; stroke: currentColor; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .core { fill: currentColor; stroke: none; }
  .cut { fill: var(--dark2); stroke: none; }
  .name { margin-top: 9px; text-align: center; color: #f8ebff; letter-spacing: 0.08em; text-transform: uppercase; }
  .meta { margin-top: 2px; text-align: center; color: #c8a4d0; font-size: 10px; }
  .recipe { margin-top: 3px; text-align: center; color: var(--muted); font-size: 11px; min-height: 32px; }
</style>
</head>
<body>
<header>
  <h1>Zerg Building Primitive Sprite Sheet</h1>
  <p>Canonical 64x64 building rigs with authored visible boxes and footprints. Zerg structures are symmetrical spiky organs: paired roots, horns, mandibles, sacs, mouths.</p>
</header>

<main class="sheet" id="sheet"></main>

  <article class="card">
    <div class="art"><svg class="sprite" viewBox="0 0 64 64" aria-label="${name}" data-anchor="32 32" data-visible-box="${box}" data-footprint="${footprint}">${svg}</svg></div>
    <div class="name">${name}</div>
    <div class="meta">footprint ${footprint}</div>
    <div class="recipe">${recipe}</div>
  </article>`;
document.getElementById('sheet').innerHTML = buildings.map(card).join('');
</script>
</body>
</html>
