<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<title>Protoss Primitive Sprite Sheet</title>
<style>
  :root {
    --bg: #06050d;
    --panel: #0c0a17;
    --ink: #fff4d5;
    --muted: #9b8b68;
    --line: #3b2b16;
    --accent: #ffd15a;
    --dark: #111017;
    --dark2: #07060c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink); }
  body {
    font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    padding: 28px;
    background-image:
      linear-gradient(transparent 0 31px, rgba(255, 209, 90, 0.045) 31px 32px),
      linear-gradient(90deg, transparent 0 31px, rgba(81, 232, 255, 0.035) 31px 32px);
    background-size: 32px 32px;
  }
  header { max-width: 1180px; margin: 0 auto 22px; }
  h1 { margin: 0; font-size: 22px; letter-spacing: 0.16em; text-transform: uppercase; }
  p { margin: 8px 0 0; color: var(--muted); max-width: 900px; }
  .sheet {
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }
  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(0,0,0,0.22)), var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 12px 12px;
  }
  .art {
    height: 132px;
    display: grid;
    place-items: center;
    background: radial-gradient(72px 72px at 50% 46%, rgba(81,232,255,0.13), transparent 70%);
    color: var(--accent);
  }
  svg.sprite {
    width: 112px;
    height: 112px;
    overflow: visible;
    filter: drop-shadow(0 0 2px currentColor) drop-shadow(0 0 5px currentColor);
  }
  .panel { fill: var(--dark); stroke: currentColor; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .line { fill: none; stroke: currentColor; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .core { fill: #51e8ff; stroke: none; }
  .dark-core { fill: var(--dark2); stroke: currentColor; stroke-width: 2; }
  .cut { fill: var(--dark2); stroke: none; }
  .name { margin-top: 9px; text-align: center; color: #fff8e8; letter-spacing: 0.08em; text-transform: uppercase; }
  .meta { margin-top: 2px; text-align: center; color: #d0bd83; font-size: 10px; }
  .recipe { margin-top: 3px; text-align: center; color: var(--muted); font-size: 11px; min-height: 32px; }
</style>
</head>

</header>
