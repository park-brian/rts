<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Protoss Building Primitive Sprite Sheet</title>
<style>
  :root {
    --bg: #06050d; --panel: #0c0a17; --ink: #fff4d5; --muted: #9b8b68;
    --line: #3b2b16; --accent: #ffd15a; --dark: #111017; --dark2: #07060c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink); }
  body {
    font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    padding: 28px;
    background-image:
      linear-gradient(transparent 0 31px, rgba(255, 209, 90, 0.045) 31px 32px),
      linear-gradient(90deg, transparent 0 31px, rgba(81, 232, 255, 0.035) 31px 32px);
    background-size: 32px 32px;
  }
  header { max-width: 1180px; margin: 0 auto 22px; }
  h1 { margin: 0; font-size: 22px; letter-spacing: 0.16em; text-transform: uppercase; }
  p { margin: 8px 0 0; color: var(--muted); max-width: 920px; }
  .sheet { max-width: 1180px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
  .card { background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(0,0,0,0.22)), var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px 12px 12px; }
  .art { height: 148px; display: grid; place-items: center; background: radial-gradient(86px 78px at 50% 48%, rgba(81,232,255,0.14), transparent 72%); color: var(--accent); }
  svg.sprite { width: 124px; height: 124px; overflow: visible; filter: drop-shadow(0 0 2px currentColor) drop-shadow(0 0 5px currentColor); }
  .panel { fill: var(--dark); stroke: currentColor; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .line { fill: none; stroke: currentColor; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .cap-line {
    fill: currentColor;
    stroke: currentColor;
    stroke-width: 3;
    stroke-linejoin: round;
    stroke-linecap: round;
    filter: drop-shadow(0 0 3px currentColor) drop-shadow(0 0 7px currentColor);
  }
  .core { fill: #51e8ff; stroke: none; }
  .light { fill: #fff8e8; stroke: none; }
  .cut { fill: var(--dark2); stroke: none; }
  .name { margin-top: 9px; text-align: center; color: #fff8e8; letter-spacing: 0.08em; text-transform: uppercase; }
  .meta { margin-top: 2px; text-align: center; color: #d0bd83; font-size: 10px; }
  .recipe { margin-top: 3px; text-align: center; color: var(--muted); font-size: 11px; min-height: 32px; }
</style>
</head>
<body>
<header>
  <h1>Protoss Building Primitive Sprite Sheet</h1>
  <p>Canonical 64x64 building rigs with build footprints stored as metadata. Protoss buildings are alien industrial pads: trapezoid shells, tower heads, cyan inserts.</p>
</header>

<main class="sheet" id="sheet"></main>

<script>
// Renderer contract for every building below:
// - 64x64 local rig; data-footprint is build-tile placement metadata.
// - data-visible-box is the visible ink fit box inside the footprint-sized world slot.
// - data-part/data-anim/data-emits survive export; comments do not.
const buildings = [
  ['Nexus','4 3','6 13 52 39','rectangular base pyramid with bright eye',`
    <rect class="panel" data-part="pyramid-base" x="6" y="13" width="52" height="39"/>
    <path class="line" data-part="pyramid-face-edges" d="M6 52 L32 13 L58 52 Z"/>
    <rect class="cap-line" data-part="apex-cap" x="22" y="13" width="20" height="15"/>
    <circle class="light" data-part="warp-eye" data-anim="core-pulse" cx="32" cy="39" r="5"/>
  `],
  ['Pylon','2 2','19 19 26 26','crystal centered inside 2x2 footprint',`
    <polygon class="core" data-part="power-crystal" data-anim="field-pulse" points="32,19 45,32 32,45 19,32"/>
    <path class="line" data-part="left-cradle" d="M25 25 Q20 32 25 39"/>
    <path class="line" data-part="right-cradle" d="M39 25 Q44 32 39 39"/>
    <path class="line" data-part="field-ring" d="M23 39 Q32 44 41 39"/>
  `],
  ['Assimilator','4 2','6 19 52 26','wide narrow centered gas capsule, side towers, cyan vent',`
    <ellipse class="panel" data-part="gas-ring" cx="32" cy="32" rx="26" ry="13"/>
    <circle class="light" data-part="left-side-eye" data-anim="gas-pulse" cx="12.5" cy="32" r="3"/>
    <circle class="light" data-part="right-side-eye" data-anim="gas-pulse" cx="51.5" cy="32" r="3"/>
    <ellipse class="core" data-part="gas-core" data-anim="gas-pulse" cx="32" cy="32" rx="4" ry="8"/>
  `],
  ['Gateway','4 3','6 13 52 39','two separated pyramid halves, centered portal circle',`
    <polygon class="panel" data-part="left-pyramid-half" points="28,13 27,52 6,52"/>
    <polygon class="panel" data-part="right-pyramid-half" points="36,13 58,52 37,52"/>
    <line class="line" data-part="left-bisector" x1="28" y1="13" x2="27" y2="52"/>
    <line class="line" data-part="right-bisector" x1="36" y1="13" x2="37" y2="52"/>
    <circle class="panel" data-part="portal-ring" data-anim="warp-pulse" cx="32" cy="32.5" r="8"/>
    <circle class="core" data-part="portal-core" cx="32" cy="32.5" r="4"/>
  `],
  ['Forge','3 2','12.5 19 39 26','circle over right square and taller side cap',`
    <rect class="panel" data-part="right-square" x="33" y="22" width="18" height="20" rx="2"/>
    <rect class="panel" data-part="square-cap" x="46.5" y="19" width="5" height="26" rx="2"/>
    <circle class="panel" data-part="forge-circle" cx="25.5" cy="32" r="12.5"/>
    <circle class="core" data-part="forge-core" data-anim="upgrade-pulse" cx="25.5" cy="32" r="5"/>
  `],
  ['Photon Cannon','2 2','19 19 26 26','three concentric circles inside 2x2 footprint',`
    <circle class="panel" data-part="outer-ring" data-anim="turret-aim" cx="32" cy="32" r="13"/>
    <circle class="line" data-part="middle-ring" data-anim="turret-aim" cx="32" cy="32" r="8"/>
    <circle class="core" data-part="inner-core" data-anim="turret-aim" data-emits="photon" data-emission-dir="0 -1" cx="32" cy="32" r="4"/>
  `],
  ['Cybernetics Core','3 2','12.5 19 39 26','left backing rect, main eye, two larger right under-nodes',`
    <rect class="panel" data-part="left-backing-rect" x="12.5" y="24" width="22" height="16" rx="2"/>
    <circle class="panel" data-part="upper-under-node" data-anim="node-pulse" cx="45.5" cy="25.5" r="6"/>
    <circle class="panel" data-part="lower-under-node" data-anim="node-pulse" cx="45.5" cy="38.5" r="6"/>
    <circle class="core" data-part="upper-node-eye" data-anim="node-pulse" cx="45.5" cy="25.5" r="2.4"/>
    <circle class="core" data-part="lower-node-eye" data-anim="node-pulse" cx="45.5" cy="38.5" r="2.4"/>
    <circle class="panel" data-part="main-core-circle" cx="32" cy="32" r="12"/>
    <circle class="core" data-part="central-eye-dot" data-anim="node-pulse" cx="32" cy="32" r="3"/>
  `],
  ['Shield Battery','3 2','12.5 19 39 26','thin cross battery with small inner core',`
    <rect class="panel" data-part="north-appendage" data-anim="shield-pulse" x="30" y="19" width="4" height="13" rx="1.5"/>
    <rect class="panel" data-part="south-appendage" data-anim="shield-pulse" x="30" y="32" width="4" height="13" rx="1.5"/>
    <rect class="panel" data-part="west-appendage" data-anim="shield-pulse" x="12.5" y="30" width="19.5" height="4" rx="1.5"/>
    <rect class="panel" data-part="east-appendage" data-anim="shield-pulse" x="32" y="30" width="19.5" height="4" rx="1.5"/>
    <circle class="panel" data-part="battery-hub" cx="32" cy="32" r="7"/>
    <circle class="core" data-part="battery-core" cx="32" cy="32" r="3"/>
  `],
  ['Robotics Facility','3 2','12.5 19 39 26','eye shape with round iris and pupil',`
    <ellipse class="panel" data-part="facility-oval" cx="32" cy="32" rx="19.5" ry="13"/>
    <line class="line" data-part="left-horizontal-bisector" x1="12.5" y1="32" x2="25" y2="32"/>
    <line class="line" data-part="right-horizontal-bisector" x1="39" y1="32" x2="51.5" y2="32"/>
    <circle class="line" data-part="iris-ring" data-anim="production-pulse" cx="32" cy="32" r="7"/>
    <circle class="core" data-part="pupil" data-anim="production-pulse" cx="32" cy="32" r="3"/>
  `],
  ['Stargate','4 3','6 13 52 39','side-facing carrier hulls flush to 4x3 footprint',`
    <path class="panel" data-part="upper-launch-hull" data-anim="launch-pulse" d="M6 29 C11 19 25 13 42 14 C52 15 57 20 58 25 C45 30 22 31 6 29 Z"/>
    <path class="line" data-part="upper-inner-arc" data-anim="launch-pulse" d="M9 27 C22 23 42 23 55 26"/>
    <path class="panel" data-part="lower-launch-hull" data-anim="launch-pulse" d="M6 36 C11 46 25 52 42 51 C52 50 57 45 58 40 C45 35 22 34 6 36 Z"/>
    <path class="line" data-part="lower-inner-arc" data-anim="launch-pulse" d="M9 38 C22 42 42 42 55 39"/>
    <ellipse class="core" data-part="launch-core" data-anim="launch-pulse" cx="32" cy="32.5" rx="6" ry="3.5"/>
  `],
  ['Citadel of Adun','3 2','12.5 19 39 26','left block, right tall block, right-shifted joining circle',`
    <rect class="panel" data-part="left-block" x="13" y="28" width="29" height="8" rx="2"/>
    <rect class="panel" data-part="right-tall-bar" x="42" y="19" width="9.5" height="26" rx="3"/>
    <circle class="panel" data-part="joining-circle" cx="39" cy="32" r="7"/>
    <circle class="core" data-part="citadel-core" cx="39" cy="32" r="4"/>
  `],
  ['Templar Archives','3 2','12.5 19 39 26','right-pointing leaf, center circle, right-end dot',`
    <path class="panel" data-part="archive-leaf" d="M13 32 C23 20 40 20 51 32 C40 44 23 44 13 32 Z"/>
    <circle class="line" data-part="archive-center-circle" data-anim="archive-pulse" cx="32" cy="32" r="7"/>
    <circle class="core" data-part="right-end-dot" data-anim="archive-pulse" cx="47" cy="32" r="3"/>
  `],
  ['Robotics Support Bay','3 2','12.5 19 39 26','oval bay, circle under overlaid arms',`
    <ellipse class="panel" data-part="support-bay-oval" cx="32" cy="32" rx="16" ry="8"/>
    <circle class="panel" data-part="support-hub" cx="32" cy="32" r="7"/>
    <rect class="panel" data-part="north-arm" data-anim="support-pulse" x="29" y="19" width="6" height="13" rx="2"/>
    <rect class="panel" data-part="south-arm" data-anim="support-pulse" x="29" y="32" width="6" height="13" rx="2"/>
    <rect class="panel" data-part="west-arm" data-anim="support-pulse" x="12.5" y="29" width="19.5" height="6" rx="2"/>
    <rect class="panel" data-part="east-arm" data-anim="support-pulse" x="32" y="29" width="19.5" height="6" rx="2"/>
    <circle class="core" data-part="support-core" cx="32" cy="32" r="5"/>
  `],
  ['Observatory','3 2','12.5 19 39 26','quarter wheel arc and three spoke nodes inside 3x2 footprint',`
    <path class="line" data-part="quarter-arc" data-anim="lens-scan" d="M18.56 27.56 A19 19 0 0 1 45.44 27.56"/>
    <line class="line" data-part="left-spoke" x1="32" y1="41" x2="18.56" y2="27.56"/>
    <line class="line" data-part="center-spoke" x1="32" y1="41" x2="32" y2="22"/>
    <line class="line" data-part="right-spoke" x1="32" y1="41" x2="45.44" y2="27.56"/>
    <circle class="panel" data-part="arc-node-left" data-anim="antenna-pulse" cx="18.56" cy="27.56" r="3.5"/>
    <circle class="panel" data-part="arc-node-center" data-anim="antenna-pulse" cx="32" cy="22" r="3.5"/>
    <circle class="panel" data-part="arc-node-right" data-anim="antenna-pulse" cx="45.44" cy="27.56" r="3.5"/>
    <circle class="core" data-part="lens" data-anim="lens-scan" cx="32" cy="41" r="3.5"/>
  `],
  ['Fleet Beacon','3 2','12.5 19 39 26','Starfleet-style delta insignia with central eye',`
    <path class="panel" data-part="delta-insignia" data-anim="signal-pulse" d="M32 19 L51.5 45 L37 39 L32 34 L27 39 L12.5 45 Z"/>
    <circle class="panel" data-part="beacon-eye" cx="32" cy="32" r="8.5"/>
    <circle class="core" data-part="beacon-pupil" data-anim="signal-pulse" cx="32" cy="32" r="3.5"/>
  `],
  ['Arbiter Tribunal','3 2','12.5 19 39 26','smaller circle over four pointed cardinal rays',`
    <polygon class="panel" data-part="north-pointed-ray" data-anim="stasis-pulse" points="28,32 36,32 32,19"/>
    <polygon class="panel" data-part="east-pointed-ray" data-anim="stasis-pulse" points="32,28 32,36 51.5,32"/>
    <polygon class="panel" data-part="south-pointed-ray" data-anim="stasis-pulse" points="36,32 28,32 32,45"/>
    <polygon class="panel" data-part="west-pointed-ray" data-anim="stasis-pulse" points="32,36 32,28 12.5,32"/>
    <circle class="panel" data-part="tribunal-circle" cx="32" cy="32" r="9"/>
    <circle class="core" data-part="tribunal-core" cx="32" cy="32" r="4"/>
  `],
];

const card = ([name, footprint, box, recipe, svg]) => `
  <article class="card">
    <div class="art"><svg class="sprite" viewBox="0 0 64 64" aria-label="${name}" data-anchor="32 32" data-visible-box="${box}" data-footprint="${footprint}" data-forward="0 -1" data-fit="visible-box" data-scale-role="building-footprint">${svg}</svg></div>
    <div class="name">${name}</div>
    <div class="meta">footprint ${footprint}</div>
    <div class="recipe">${recipe}</div>
  </article>`;
document.getElementById('sheet').innerHTML = buildings.map(card).join('');
</script>
</body>
</html>
