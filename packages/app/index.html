<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Cross-origin isolation for SharedArrayBuffer on GitHub Pages (which can't send
         COOP/COEP headers). Must be a classic script in <head>, before the module bundle. -->
    <script src="./coi-serviceworker.js"></script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>RTS</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e13;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #e6edf3;
        touch-action: none; user-select: none; -webkit-user-select: none; }
      #game, #overlay { position: fixed; inset: 0; display: block; }
      #overlay { pointer-events: none; } /* world is GL; this layer is screen-space chrome */
      #ui { position: fixed; inset: 0; pointer-events: none; }
      #ui > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <canvas id="overlay"></canvas>
    <div id="ui"></div>
    <script type="module" src="./bundle.js"></script>
  </body>
</html>
