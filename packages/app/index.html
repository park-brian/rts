<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>RTS</title>
    <style>
      :root {
        color-scheme: dark;
        --top-chrome: calc(76px + env(safe-area-inset-top));
        --bottom-chrome: calc(92px + env(safe-area-inset-bottom));
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e13;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #e6edf3;
        touch-action: none; user-select: none; -webkit-user-select: none; }
      #game, #overlay {
        position: fixed;
        left: 0;
        right: 0;
        top: var(--top-chrome);
        bottom: var(--bottom-chrome);
        width: 100%;
        height: auto;
        display: block;
      }
      #overlay { pointer-events: none; } /* world is GL; this layer is screen-space chrome */
      #ui { position: fixed; inset: 0; pointer-events: none; }
      #ui > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <canvas id="overlay"></canvas>
    <div id="ui"></div>
    <script type="module" src="./bundle.js"></script>
  </body>
</html>
